<!doctype html>
<html lang="sl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>STEP analiza kosa</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="panel controls">
      <div>
        <h1>STEP analiza kosa</h1>
        <p class="muted">Osnovni pregled dimenzij in lukenj po ploskvah.</p>
      </div>

      <label class="dropzone" id="dropzone">
        <input id="file" type="file" accept=".step,.stp">
        <span>
          <strong id="file-name">Izberi STEP/STP datoteko</strong>
          <span id="file-meta">Datoteka ostane v browserju.</span>
        </span>
      </label>

      <div class="settings">
        <label>
          Toleranca ploskve
          <input id="face-tolerance" type="number" min="0.01" step="0.01" value="0.25">
        </label>
        <label>
          Min. radius luknje
          <input id="min-radius" type="number" min="0" step="0.1" value="1">
        </label>
        <label>
          Max. radius luknje
          <input id="max-radius" type="number" min="0" step="0.1" value="25">
        </label>
      </div>

      <div class="actions">
        <button id="analyze" class="primary" disabled>Analiziraj</button>
        <button id="clear">Pocisti</button>
      </div>

      <div id="status" class="status">Pripravljen</div>
    </section>

    <section class="results">
      <section class="panel" id="dimensions" hidden>
        <h2>Dimenzije</h2>
        <div class="grid" id="dimension-grid"></div>
      </section>

      <section class="panel" id="faces" hidden>
        <h2>Ploskve in luknje</h2>
        <div class="face-list" id="face-list"></div>
      </section>

      <section class="panel" id="raw" hidden>
        <h2>STEP povzetek</h2>
        <pre id="raw-output"></pre>
      </section>
    </section>
  </main>

  <script src="step-app.js"></script>
</body>
</html>
